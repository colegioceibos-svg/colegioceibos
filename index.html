<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Booking System</title>
    <style>
        body { font-family: Arial, sans-serif; }
        header { background: #4CAF50; color: white; padding: 1em; text-align: center; }
        .container { width: 50%; margin: auto; }
        .form-group { margin: 1em 0; }
        label { display: block; margin-bottom: 0.5em; }
        input { width: 100%; padding: 0.5em; }
        button { padding: 0.5em 1em; background: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background: #45a049; }
    </style>
</head>
<body>
    <header>
        <h1>Schedule Booking System</h1>
    </header>
    <div class="container">
        <section id="login">
            <h2>Login</h2>
            <form>
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit">Login</button>
            </form>
        </section>
        <section id="user-management">
            <h2>User Management</h2>
            <!-- User management features can be added here -->
        </section>
        <section id="booking">
            <h2>Booking Schedule</h2>
            <!-- Booking management features can be added here -->
        </section>
    </div>
</body>
</html>
